  <head>

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
      /* ── Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: linear-gradient(160deg, #060e1c 0%, #0D1B2A 45%, #0a2040 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.5rem;
        font-family: 'Cairo', 'Segoe UI', sans-serif;
        overflow: hidden;
        opacity: 1;
        transition: opacity 0.55s ease;
      }
      #splash.splash-out {
        opacity: 0;
        pointer-events: none;
      }

      /* floating bubbles */
      .spl-bubble {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0,170,255,0.18) 0%, transparent 70%);
        animation: spl-rise var(--dur, 7s) ease-in var(--delay, 0s) infinite;
        bottom: -120px;
      }

      /* logo */
      .spl-logo-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        animation: spl-float 3s ease-in-out infinite;
      }
      .spl-ring {
        position: absolute;
        inset: -7px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #00AAFF;
        border-right-color: #C9A84C;
        border-bottom-color: rgba(0,170,255,0.25);
        border-left-color: rgba(201,168,76,0.25);
        animation: spl-spin 1.6s linear infinite;
      }
      .spl-ring-outer {
        position: absolute;
        inset: -14px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        border-top-color: rgba(201,168,76,0.4);
        border-bottom-color: rgba(0,170,255,0.3);
        animation: spl-spin 2.8s linear infinite reverse;
      }
      .spl-logo-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow:
          0 0 0 3px rgba(0,170,255,0.25),
          0 0 40px rgba(0,170,255,0.45),
          0 0 80px rgba(0,170,255,0.2);
        animation: spl-glow 2.5s ease-in-out infinite;
      }

      /* brand text */
      .spl-brand {
        text-align: center;
        line-height: 1.3;
      }
      .spl-name {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: 3px;
        background: linear-gradient(100deg, #ffffff 0%, #C9A84C 38%, #00AAFF 62%, #ffffff 100%);
        background-size: 250% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: spl-shimmer 3s linear infinite;
        font-family: 'Montserrat', 'Cairo', sans-serif;
      }
      .spl-tagline {
        font-size: 0.82rem;
        color: rgba(255,255,255,0.45);
        margin-top: 0.35rem;
        letter-spacing: 1.5px;
        direction: rtl;
        animation: spl-fade-in 1s ease 0.3s both;
      }

      /* dots loader */
      .spl-dots {
        display: flex;
        gap: 9px;
        animation: spl-fade-in 0.8s ease 0.5s both;
      }
      .spl-dots span {
        display: block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: spl-bounce 1.3s ease-in-out infinite;
      }
      .spl-dots span:nth-child(1) { background: #00AAFF; animation-delay: 0s; }
      .spl-dots span:nth-child(2) { background: #C9A84C; animation-delay: 0.2s; }
      .spl-dots span:nth-child(3) { background: #00AAFF; animation-delay: 0.4s; }

      /* bottom wave */
      .spl-wave {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 90px;
        overflow: hidden;
      }
      .spl-wave svg {
        width: 200%;
        height: 100%;
        animation: spl-wave-move 5s linear infinite;
      }

      /* ── Keyframes ── */
      @keyframes spl-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes spl-glow {
        0%, 100% {
          box-shadow: 0 0 0 3px rgba(0,170,255,0.25), 0 0 35px rgba(0,170,255,0.4), 0 0 70px rgba(0,170,255,0.15);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(0,170,255,0.35), 0 0 60px rgba(0,170,255,0.7), 0 0 110px rgba(0,170,255,0.3);
        }
      }
      @keyframes spl-float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-10px); }
      }
      @keyframes spl-shimmer {
        0%   { background-position: 0% center; }
        100% { background-position: 250% center; }
      }
      @keyframes spl-bounce {
        0%, 60%, 100% { transform: translateY(0);    opacity: 0.7; }
        30%            { transform: translateY(-12px); opacity: 1;   }
      }
      @keyframes spl-rise {
        0%   { transform: translateY(0) scale(0.3); opacity: 0; }
        10%  { opacity: 0.8; }
        90%  { opacity: 0.3; }
        100% { transform: translateY(calc(-100vh - 120px)) scale(1.4); opacity: 0; }
      }
      @keyframes spl-wave-move {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes spl-fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>

    <script>
      window.__drTravelInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__drTravelInstallPrompt = e;
        window.dispatchEvent(new CustomEvent('drtravel-install-available'));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', {
            updateViaCache: 'none'  // never use cached sw.js; always fetch fresh
          }).then(function(reg) {
            // Force update check every time page loads
            reg.update();
            // If a new SW is waiting, skip it immediately
            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            reg.addEventListener('updatefound', function() {
              var newSW = reg.installing;
              if (newSW) {
                newSW.addEventListener('statechange', function() {
                  if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                    // New SW installed, skip waiting
                    newSW.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              }
            });
          }).catch(function() {});
        });
      }
    </script>
  </head>
  <body>

    <!-- ════ SPLASH SCREEN ════ -->
    <div id="splash">
      <!-- floating bubbles (background depth) -->
      <div class="spl-bubble" style="width:180px;height:180px;left:8%;--dur:8s;--delay:0s;"></div>
      <div class="spl-bubble" style="width:100px;height:100px;left:55%;--dur:6s;--delay:1.5s;"></div>
      <div class="spl-bubble" style="width:140px;height:140px;left:78%;--dur:10s;--delay:0.5s;"></div>
      <div class="spl-bubble" style="width:60px;height:60px;left:30%;--dur:7s;--delay:2s;"></div>
      <div class="spl-bubble" style="width:90px;height:90px;left:15%;--dur:9s;--delay:3s;"></div>

      <!-- logo with spinning rings -->
      <div class="spl-logo-wrap">
        <div class="spl-ring-outer"></div>
        <div class="spl-ring"></div>
        <img class="spl-logo-img" src="/logo.jpg" alt="DR Travel" />
      </div>

      <!-- brand name -->
      <div class="spl-brand">
        <div class="spl-name">DR TRAVEL</div>
        <div class="spl-tagline">يخت سياحة وسفاري · مرسى مطروح</div>
      </div>

      <!-- loading dots -->
      <div class="spl-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- bottom wave decoration -->
      <div class="spl-wave">
        <svg viewBox="0 0 1440 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,45 C180,80 360,10 540,45 C720,80 900,10 1080,45 C1260,80 1440,10 1440,45 L1440,90 L0,90 Z" fill="rgba(0,170,255,0.08)"/>
          <path d="M0,60 C180,30 360,80 540,55 C720,30 900,80 1080,55 C1260,30 1440,75 1440,55 L1440,90 L0,90 Z" fill="rgba(0,170,255,0.05)"/>
          <path d="M720,45 C900,80 1080,10 1260,45 C1440,80 1620,10 1800,45 C1980,80 2160,10 2160,45 L2160,90 L720,90 Z" fill="rgba(201,168,76,0.04)"/>
        </svg>
      </div>
    </div>
    <!-- ════ END SPLASH ════ -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
