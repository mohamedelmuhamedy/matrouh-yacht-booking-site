kind = "web"
previewPath = "/"
title = "DR Travel — Yacht Tourism & Safari"
version = "1.0.0"
id = "artifacts/dr-travel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22704
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dr-travel run dev"

[services.env]
PORT = "22704"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dr-travel", "run", "build"]
publicDir = "artifacts/dr-travel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
